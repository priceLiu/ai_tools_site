# 自动构建 Docker 镜像（可选：构建期连库预渲染）
#
# 在仓库 Settings → Secrets → Actions 中配置其一：
#   - DATABASE_URL（推荐，与运行时同名）
#   - BUILD_DATABASE_URL（仅构建用密钥名，避免与运行时分流）
#
# 未配置时仍会 docker build（无 build-arg），行为与腾讯云控制台「仅运行时注入 DATABASE_URL」一致。
name: Docker build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (with DB pre-render when secrets set)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BUILD_DATABASE_URL: ${{ secrets.BUILD_DATABASE_URL }}
        run: |
          set -euo pipefail
          TAG="ai-tools:${GITHUB_SHA:0:12}"
          if [ -n "${DATABASE_URL:-}" ] || [ -n "${BUILD_DATABASE_URL:-}" ]; then
            echo "Using DATABASE_URL / BUILD_DATABASE_URL secret for docker build --build-arg"
            sh scripts/docker-build-ci.sh -t "$TAG"
          else
            echo "::notice::No DATABASE_URL/BUILD_DATABASE_URL in Actions secrets — building without DB build-arg (ISR at runtime). See docs/ci-auto-build-database-url.md"
            docker build -t "$TAG" .
          fi
